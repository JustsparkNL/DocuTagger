<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocuTagger by Uninova</title>

  <!-- Office.js -->
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

  <!-- Fluent UI -->
  <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
  <header class="ms-welcome__header ms-bgColor-neutralLighter">
    <img height="90" src="visiedosis_logo.png" alt="uninova logo" title="Uninova" />
    <h1 class="ms-font-su">VisieDosis Add-In</h1>
  </header>

  <section id="sideload-msg" class="ms-welcome__main">
    <h2 class="ms-font-xl">
      Please <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">
      sideload</a> your add-in to see app body.
    </h2>
  </section>

  <main id="app-body" class="ms-welcome__main" style="display:none;">
    <p class="ms-font-m">
      Klik om het SharePoint Document ID in te voegen op de plek van <code>{{ID}}</code> in je document.
    </p>
    <div role="button" id="run" class="ms-welcome__action ms-Button ms-Button--hero ms-font-xl">
      <span class="ms-Button-label">Tag dit document</span>
    </div>
    <p id="status" class="ms-font-s" style="color:#0078d4;margin-top:1em;"></p>
  </main>

  <script>
console.log("Word add-in script geladen");

Office.onReady((info) => {
  console.log("Office.onReady:", info);

  if (info.host === Office.HostType.Word) {
    document.getElementById("sideload-msg").style.display = "none";
    document.getElementById("app-body").style.display = "flex";
    document.getElementById("run").onclick = replaceID;

    console.log("Word host gedetecteerd, UI geïnitialiseerd");
  }
});

/* =========================
   Hoofdfunctie
========================= */
async function replaceID() {
  console.log("replaceID gestart");
  setStatus("Document ID wordt opgehaald...");

  try {
    const docId = await resolveDocumentId();
    const replacementText = docId ?? "NOTFOUND";

    console.log("Te gebruiken Document ID:", replacementText);

    await Word.run(async (context) => {
      const results = context.document.body.search("{{ID}}", {
        matchCase: true,
        matchWholeWord: true
      });

      context.load(results, "text");
      await context.sync();

      console.log("Aantal {{ID}} placeholders:", results.items.length);

      if (results.items.length === 0) {
        setStatus("Geen '{{ID}}' gevonden in het document.");
        return;
      }

      results.items.forEach(item => {
        item.insertText(replacementText, Word.InsertLocation.replace);
      });

      await context.sync();
      console.log("Placeholders vervangen");

      setStatus("Document succesvol getagd met ID: " + replacementText);
    });
  } catch (error) {
    console.error("replaceID fout:", error);
    setStatus("Fout bij vervangen van Document ID");
  }
}

/* =========================
   Document ID resolver
========================= */
async function resolveDocumentId() {
  console.log("resolveDocumentId gestart");

  const spId = await getSharePointDocumentId();
  if (spId) {
    console.log("Document ID via SharePoint verkregen");
    return spId;
  }

  console.warn("SharePoint ID niet beschikbaar, fallback naar lokaal document");

  const XML_NS = "http://schemas.microsoft.com/office/2006/metadata/properties";
  const localId = await getCustomXmlValue(XML_NS, "_dlc_DocId");

  if (localId) {
    console.log("Document ID via custom XML verkregen");
    return localId;
  }

  console.warn("Geen Document ID gevonden via SharePoint of custom XML");
  return null;
}

/* =========================
   SharePoint Document ID
========================= */
async function getSharePointDocumentId() {
  console.log("getSharePointDocumentId gestart");

  try {
    const fileUrl = Office.context.document.url;
    console.log("Document URL:", fileUrl);

    if (!fileUrl || !fileUrl.includes("sharepoint.com")) {
      console.warn("Document staat niet op SharePoint");
      return null;
    }

    const relativePath = new URL(fileUrl).pathname;
    const siteName = fileUrl.split("/sites/")[1] ?.split("/")[0];
    const siteUrl = fileUrl.split("/sites/")[0] + "/sites/" + siteName;

    const apiUrl =
      `${siteUrl}/_api/web/GetFileByServerRelativeUrl('${relativePath}')/ListItemAllFields`;

    console.log("SharePoint API URL:", apiUrl);

    const response = await fetch(apiUrl, {
      method: "GET",
      headers: { Accept: "application/atom+xml" },
      credentials: "include"
    });

    console.log("SharePoint API status:", response.status);

    if (!response.ok) return null;

    const text = await response.text();
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(text, "application/xml");

    const idNode = xmlDoc.getElementsByTagName("d:OData__dlc_DocId")[0];
    const docId = idNode ? idNode.textContent : null;

    if (!docId) {
      console.warn("Geen Document ID in SharePoint response");
      return null;
    }

    console.log("SharePoint Document ID:", docId);
    return docId;
  } catch (error) {
    console.error("SharePoint fout:", error);
    return null;
  }
}

/* =========================
   Lokaal Document ID (XML)
========================= */
async function getCustomXmlValue(namespace, localName) {
  console.log("getCustomXmlValue:", namespace, localName);

  return Word.run(async (context) => {
    const parts = context.document.customXmlParts.getByNamespace(namespace);
    context.load(parts, "items");
    await context.sync();

    console.log("Aantal customXmlParts:", parts.items.length);

    for (const part of parts.items) {
      const xml = part.getXml();
      await context.sync();

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xml.value, "application/xml");
      const node = xmlDoc.getElementsByTagName(localName)[0];

      if (node && node.textContent) {
        console.log("Custom XML waarde gevonden:", node.textContent);
        return node.textContent;
      }
    }

    console.warn("Custom XML waarde niet gevonden:", localName);
    return null;
  });
}

/* =========================
   Status helper
========================= */
function setStatus(message) {
  console.log("Status:", message);
  document.getElementById("status").innerText = message;
}

  </script>
</body>
</html>
